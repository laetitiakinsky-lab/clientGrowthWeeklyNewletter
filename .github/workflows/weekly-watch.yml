name: Client Growth Mobility Weekly Watch

on:
  schedule:
    - cron: '0 6 * * 3'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run? (true = DM to Laetitia only, false = post to channel + Victor)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Generate newsletter and post to Slack
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SCRIPT: 
        run: python3 -c "import base64,os; exec(base64.b64decode(os.environ['SCRIPT']).decode())"

name: Client Growth Mobility Weekly Watch

on:
  schedule:
    # Every Wednesday at 06:00 UTC = 08:00 CEST (Paris)
    - cron: '0 6 * * 3'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run? (true = DM to Laetitia only, false = post to channel + Victor)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Generate newsletter and post to Slack
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import datetime
          import sys
          import os

          ANTHROPIC_API_KEY = os.environ["ANTHROPIC_API_KEY"]
          SLACK_BOT_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          DRY_RUN = os.environ.get("DRY_RUN", "false").lower() == "true"

          SOURCE_CHANNELS = [
              "C036XMK8QUT",  # competitive-intelligence
              "C0253FT85R9",  # competitive-intelligence-territories
              "C01U99UDTK4",  # competitive-intellligence-mobility
              "C0ABCJSFUSJ",  # crossteam-ke-marketing
              "C06CGR2QLEM",  # marketing-territoires
              "C02HBAGEM18",  # useful-media-impact-karos
              "C062JEMQWJF",  # useful-product-inspiration
          ]

          TARGET_CHANNEL = "C0A4H3JQMQR"   # team-feature-client-growth-internal
          VICTOR_USER_ID = "U074KSU1K5H"   # Victor Andraud
          LAETITIA_USER_ID = "U07Q8JGCQH4" # Laetitia (dry run)

          today = datetime.date.today()
          week_ago = today - datetime.timedelta(days=7)
          oldest_ts = str(int(datetime.datetime.combine(week_ago, datetime.time.min).timestamp()))

          def slack_api(endpoint, payload):
              url = f"https://slack.com/api/{endpoint}"
              data = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  url, data=data,
                  headers={
                      "Authorization": f"Bearer {SLACK_BOT_TOKEN}",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  if not result.get("ok"):
                      print(f"  Slack API warning on {endpoint}: {result.get('error')}")
                  return result

          def open_dm_and_post(user_id, text):
              result = slack_api("conversations.open", {"users": user_id})
              if result.get("ok"):
                  channel_id = result["channel"]["id"]
                  slack_api("chat.postMessage", {
                      "channel": channel_id,
                      "text": text,
                      "unfurl_links": False,
                      "unfurl_media": False,
                  })
                  print(f"  DM sent to {user_id}")
              else:
                  print(f"  Could not open DM with {user_id}: {result.get('error')}")

          def get_channel_messages(channel_id):
              payload = {"channel": channel_id, "oldest": oldest_ts, "limit": 50}
              result = slack_api("conversations.history", payload)
              if not result.get("ok"):
                  print(f"  Could not read {channel_id}: {result.get('error')}")
                  return []
              messages = result.get("messages", [])
              return [m for m in messages if m.get("subtype") is None and m.get("text", "").strip()]

          print("Fetching Slack messages from the past 7 days...")
          all_messages = []
          for channel_id in SOURCE_CHANNELS:
              msgs = get_channel_messages(channel_id)
              print(f"  {channel_id}: {len(msgs)} messages")
              for m in msgs:
                  ts_fmt = datetime.datetime.fromtimestamp(float(m["ts"])).strftime("%Y-%m-%d")
                  all_messages.append({
                      "channel": channel_id,
                      "date": ts_fmt,
                      "text": m.get("text", ""),
                      "ts": m["ts"],
                  })

          if not all_messages:
              print("No messages found this week — skipping post.")
              sys.exit(0)

          print(f"Total: {len(all_messages)} messages collected.")

          messages_text = "\n\n".join([
              f"[{m['date']} | channel:{m['channel']} | slack_ts:{m['ts']}]\n{m['text']}"
              for m in all_messages
          ])

          start_str = week_ago.strftime("%B %d")
          end_str = today.strftime("%B %d")
          date_label = f"{start_str}–{end_str}"

          SYSTEM_PROMPT = """You are a strategic intelligence agent for the Client Growth product feature team at Karos, a B2B daily carpooling platform.

== YOUR AUDIENCE ==
Product Managers, Designers, and Engineers in the Client Growth team. They work across the full product development cycle: Discover → Scope → Frame → Make → Go to Market → Assess Impact.

Your newsletter must serve them specifically in the early phases: Discovery (understanding problems in their entirety), Scoping (narrowing to key issues, understanding reach/impact), and Framing (identifying solutions, competitive benchmarks, market context).

Every signal you surface should help them answer one or more of these questions:
- What problems are our KT/KE clients facing that we haven't solved yet?
- What are competitors doing that could inform our solution space?
- What market trends or regulations could affect our product decisions?
- What analogous solutions in adjacent markets could inspire our approach?
- What new client needs are emerging that could reshape our roadmap?

== CLIENT GROWTH SCOPE (strict filter) ==
Only include signals relevant to these areas:
- KT/KE app & SaaS personalisation: Custom branding, SSO, Territory Showcase, pricing rules, Return insurance
- KT network integration: MaaS, Carpool Areas & Stops, Anti-competition rules, Carpool lanes, Intermodality, Transit Pass integration
- KE employer benefits: Company affiliation, Company Parking, Mobility Package / FMD, Cost-sharing
- B2B2C model evaluation: white-label carpooling, deeper territory/employer integration

Do NOT include signals about (these belong to other teams):
- Gift Machine, Challenges, Comm kits, Promocodes, Karos events → Client Servicing
- Fraud, compliance, invoicing, Admin tools → Client Servicing
- User onboarding, matching, booking, ride experience → Carpooling Experience
- Referral program, user lifecycle, retention campaigns → Carpooling Experience

== EDITORIAL STANDARDS ==
1. PRODUCT UTILITY: Every bullet must serve discovery, scoping, or framing work. Ask: "Would a PM use this to better understand a problem, scope a solution, or benchmark against competitors?" If no → cut it.
2. INSTRUCTIVE, NOT DESCRIPTIVE: Don't just report that something happened. Explain what it means for Client Growth's product decisions. "X happened" is not enough — "X happened, which means we should consider Y when scoping Z" is the bar.
3. PRIORITISE BY PRODUCT IMPACT: Lead with signals about unmet client needs (KT/KE demands), competitive product moves, and market trends that could directly influence the roadmap.
4. HONESTY OVER PADDING: 3 to 7 bullets max. If fewer than 3 relevant signals exist this week, publish fewer. Never pad with low-value content.
5. EXTERNAL LINKS: Include web source links only when you are certain the URL is exact and functional. Never guess or construct URLs. If uncertain, use only the Slack link.
6. NO LINK PREVIEWS: Always use format <URL|Label> to suppress Slack previews.
7. LANGUAGE: English only.

== OUTPUT FORMAT ==
*📡 Client Growth Mobility Weekly Watch — [DATES]*

---

[3–7 bullet points, each on its own block]
EMOJI *Bold signal title* — 2–3 lines explaining the signal AND its implication for Client Growth product work (discovery/scoping/framing).
→ <https://karoscrew.slack.com/archives/CHANNEL_ID/pTIMESTAMP|Slack>[optionally · <VERIFIED_URL|Source name>]

---
_🧪 Beta · AI-generated from Slack signals · Feedback welcome_"""

          USER_PROMPT = f"""Here are all messages posted this week across our monitored Slack channels:

---
{messages_text}
---

Generate the weekly newsletter for the Client Growth product team.
Date range: {date_label}
Today: {today.strftime("%B %d, %Y")}
Mode: {"DRY RUN (testing)" if DRY_RUN else "PRODUCTION"}

For Slack archive links: convert ts by removing the dot, e.g. 1781004680.718719 → p1781004680718719
URL format: https://karoscrew.slack.com/archives/CHANNEL_ID/pTIMESTAMP

Filter strictly: only keep signals that a Product Manager would use during discovery, scoping, or framing of Client Growth features. Cut anything descriptive without product implications. Cut anything outside Client Growth scope."""

          print("Calling Claude...")
          anthropic_payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 1500,
              "system": SYSTEM_PROMPT,
              "messages": [{"role": "user", "content": USER_PROMPT}],
          }
          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(anthropic_payload).encode("utf-8"),
              headers={
                  "x-api-key": ANTHROPIC_API_KEY,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              },
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())

          newsletter = result["content"][0]["text"].strip()
          print("Newsletter generated:")
          print("---")
          print(newsletter)
          print("---")

          if DRY_RUN:
              print("DRY RUN — sending only to Laetitia...")
              open_dm_and_post(LAETITIA_USER_ID, f"🧪 *[DRY RUN — not sent to channel]*\n\n{newsletter}")
              print("Dry run complete.")
          else:
              print(f"Posting to channel {TARGET_CHANNEL}...")
              slack_api("chat.postMessage", {
                  "channel": TARGET_CHANNEL,
                  "text": newsletter,
                  "unfurl_links": False,
                  "unfurl_media": False,
              })
              print("Posting DM to Victor...")
              open_dm_and_post(VICTOR_USER_ID, newsletter)
              print("Done!")
          PYEOF
